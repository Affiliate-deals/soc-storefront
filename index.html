<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Finds</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .hero {
            padding: 40px 20px;
            text-align: center;
            background: white;
        }

        .hero h1 {
            margin: 0;
            font-size: 32px;
        }

        .hero p {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 6px;
        }

        .card h3 {
            margin: 10px 0 5px;
            font-size: 18px;
        }

        .card p {
            font-size: 14px;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>Our Finds</header>

<section class="hero">
    <h1>Today’s Best Deals</h1>
    <p>Hand‑picked finds curated for you.</p>
</section>

<section class="grid">
    <!-- Product Card Example -->
    <div class="card">
        <img src="https://via.placeholder.com/300" alt="Product">
        <h3>Sample Product</h3>
        <p>This is where your product description will go.</p>
        <a class="btn" href="#">View Deal</a>
    </div>

    <!-- Duplicate this card later for more products -->
</section>

</body>
</html>
